<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aysStore</title>
<link rel="icon" type="image/svg+xml" href="../store.svg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Handlee&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
}

html, body {
    height: 100%;
    margin: 0;
}

body {
    background: #111;
    color: #fff;
    font-family: 'Handlee', cursive, sans-serif;
    display: flex;
    flex-direction: column;
}

#apps {
    padding: 12px;
    flex: 1;
    overflow-y: auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
}

.app {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;

    padding: 12px;

    background: #1b1b1b;
    border: 1px solid #2a2a2a;
    border-radius: 8px;

    transition: background 0.15s ease;
    text-align: center;
}

.app:hover {
    background: #242424;
}

.app img {
    width: 80px;
    height: 80px;
    flex-shrink: 0;
    object-fit: contain;
}

.developer {
    font-size: 12px;
    color: #888;
    word-break: break-word;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
}

.app-buttons {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    width: 100%;
}

.app-button {
    flex: 1;
    padding: 6px 8px;
    font-size: 12px;
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    background: #1b1b1b;
    color: #fff;
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: 'Handlee', cursive, sans-serif;
}

.delete-btn {
    border-color: #d32f2f;
    color: #d32f2f;
    background: #3a1f1f;
}

.delete-btn:hover {
    background: #ef5350;
    border-color: #b71c1c;
    color: white;
}

.add-btn {
    border-color: #388e3c;
    color: #388e3c;
    background: #1f3a1f;
}

.add-btn:hover {
    background: #43a047;
    border-color: #1b5e20;
    color: white;
}

.loading,
.error {
    padding: 16px;
    color: #aaa;
    grid-column: 1 / -1;
}

#search-container {
    padding: 12px;
    background: #111;
    border-top: 1px solid #2a2a2a;
    flex-shrink: 0;
}

#search-input {
    width: 100%;
    padding: 12px;
    font-size: 14px;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    background: #1b1b1b;
    color: #fff;
    font-family: 'Handlee', cursive, sans-serif;
    box-sizing: border-box;
    transition: border-color 0.15s ease;
}

#search-input:focus {
    outline: none;
    border-color: #555;
}

#search-input::placeholder {
    color: #666;
}

/* Modal styles */
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.7);
}

.modal.show {
    display: flex;
    align-items: center;
    justify-content: center;
}

.modal-content {
    background-color: #1b1b1b;
    padding: 24px;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    max-width: 400px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.5);
}

.modal-content h2 {
    margin-top: 0;
    margin-bottom: 16px;
    font-size: 18px;
}

.modal-text-box {
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    padding: 12px;
    margin-bottom: 16px;
    font-family: monospace;
    word-break: break-all;
    user-select: all;
}

.modal-buttons {
    display: flex;
    gap: 8px;
}

.modal-button {
    flex: 1;
    padding: 10px;
    font-size: 14px;
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    background: #1b1b1b;
    color: #fff;
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: 'Handlee', cursive, sans-serif;
}

.modal-button:hover {
    background: #242424;
}

.modal-button.confirm {
    border-color: #388e3c;
    color: #388e3c;
    background: #1f3a1f;
}

.modal-button.confirm:hover {
    background: #43a047;
    border-color: #1b5e20;
    color: white;
}

.modal-button.cancel {
    border-color: #666;
    color: #aaa;
}

.modal-button.cancel:hover {
    background: #242424;
    border-color: #888;
}
</style>
</head>
<body>

<div id="apps">
    <div class="loading">loading apps...</div>
</div>

<div id="search-container">
    <input type="text" id="search-input" placeholder="search apps...">
</div>

<div id="copyModal" class="modal">
    <div class="modal-content">
        <h2>copy the text below</h2>
        <div class="modal-text-box" id="modalText"></div>
        <div class="modal-buttons">
            <button class="modal-button cancel" onclick="closeModal()">close</button>
        </div>
    </div>
</div>

<script>
const REPO_OWNER = "AYSemkiv";
const REPO_NAME = "aysOS-Apps";
const BRANCH = "main";

let allApps = [];
let textToCopy = "";

async function loadApps() {
    const container = document.getElementById("apps");

    try {
        const response = await fetch(
            `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents`
        );

        if (!response.ok) {
            throw new Error("failed to fetch repository contents");
        }

        const items = await response.json();

        // Keep only folders (apps)
        allApps = items
            .filter(item =>
                item.type === "dir" &&
                item.name !== "dark" &&
                item.name !== "light"
            )
            .sort((a, b) => a.name.localeCompare(b.name));

        // Load developer names for each app
        for (const app of allApps) {
            app.developer = await loadDeveloperName(app.name);
        }

        renderApps(allApps);

    } catch (error) {
        console.error(error);

        container.innerHTML =
            '<div class="error">failed to load apps.</div>';
    }
}

async function loadDeveloperName(appName) {
    try {
        const response = await fetch(
            `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/${appName}/dev.txt`
        );

        if (response.ok) {
            const text = await response.text();
            return text.trim();
        }
    } catch (error) {
        console.error(`failed to load dev.txt for ${appName}:`, error);
    }

    return "unknown developer";
}

function showCopyModal(text) {
    textToCopy = text;
    document.getElementById("modalText").textContent = text;
    document.getElementById("copyModal").classList.add("show");
}

function closeModal() {
    document.getElementById("copyModal").classList.remove("show");
    textToCopy = "";
}

// Close modal when clicking outside of it
document.getElementById("copyModal").addEventListener("click", (e) => {
    if (e.target.id === "copyModal") {
        closeModal();
    }
});

function renderApps(apps) {
    const container = document.getElementById("apps");
    container.innerHTML = "";

    if (apps.length === 0) {
        container.innerHTML =
            '<div class="loading">no apps found.</div>';
        return;
    }

    for (const app of apps) {
        const iconUrl =
            `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/${app.name}/assets/metro/tile.svg`;

        const appElement = document.createElement("div");
        appElement.className = "app";

        appElement.innerHTML = `
            <img src="${iconUrl}" alt="${app.name} icon">
            <div class="developer">${app.developer || "unknown developer"}</div>
            <div class="app-buttons">
                <button class="app-button delete-btn" onclick="showCopyModal('/d ${app.name}')">delete</button>
                <button class="app-button add-btn" onclick="showCopyModal('/a ${app.name}')">add</button>
            </div>
        `;

        container.appendChild(appElement);
    }
}

// Search functionality
document.getElementById("search-input").addEventListener("input", (e) => {
    const searchTerm = e.target.value.toLowerCase();

    if (searchTerm === "") {
        renderApps(allApps);
        return;
    }

    const filtered = allApps.filter(app =>
        app.name.toLowerCase().includes(searchTerm)
    );

    renderApps(filtered);
});

loadApps();
</script>

</body>
</html>
