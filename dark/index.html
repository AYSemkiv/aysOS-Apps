<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aysStore</title>
<link rel="icon" type="image/svg+xml" href="../store.svg">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #111;
    color: #fff;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

#apps {
    padding: 12px;
    flex: 1;
    overflow-y: auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
}

.app {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;

    padding: 12px;

    background: #1b1b1b;
    border: 1px solid #2a2a2a;
    border-radius: 8px;

    transition: background 0.15s ease;
    text-align: center;
}

.app:hover {
    background: #242424;
}

.app img {
    width: 80px;
    height: 80px;
    flex-shrink: 0;
    object-fit: contain;
}

.name {
    font-size: 14px;
    font-weight: 500;
    word-break: break-word;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
}

.developer {
    font-size: 12px;
    color: #888;
    word-break: break-word;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
}

.loading,
.error {
    padding: 16px;
    color: #aaa;
    grid-column: 1 / -1;
}

#search-container {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 12px;
    background: #111;
    border-top: 1px solid #2a2a2a;
    z-index: 1000;
}

#search-input {
    width: 100%;
    padding: 12px;
    font-size: 14px;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    background: #1b1b1b;
    color: #fff;
    font-family: sans-serif;
    box-sizing: border-box;
    transition: border-color 0.15s ease;
}

#search-input:focus {
    outline: none;
    border-color: #555;
}

#search-input::placeholder {
    color: #666;
}
</style>
</head>
<body>

<div id="apps">
    <div class="loading">Loading apps...</div>
</div>

<div id="search-container">
    <input type="text" id="search-input" placeholder="Search apps...">
</div>

<script>
const REPO_OWNER = "AYSemkiv";
const REPO_NAME = "aysOS-Apps";
const BRANCH = "main";

let allApps = [];

async function loadApps() {
    const container = document.getElementById("apps");

    try {
        const response = await fetch(
            `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents`
        );

        if (!response.ok) {
            throw new Error("Failed to fetch repository contents");
        }

        const items = await response.json();

        // Keep only folders (apps)
        allApps = items
            .filter(item =>
                item.type === "dir" &&
                item.name !== "dark" &&
                item.name !== "light"
            )
            .sort((a, b) => a.name.localeCompare(b.name));

        // Load developer names for each app
        for (const app of allApps) {
            app.developer = await loadDeveloperName(app.name);
        }

        renderApps(allApps);

    } catch (error) {
        console.error(error);

        container.innerHTML =
            '<div class="error">Failed to load apps.</div>';
    }
}

async function loadDeveloperName(appName) {
    try {
        const response = await fetch(
            `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/${appName}/dev.txt`
        );

        if (response.ok) {
            const text = await response.text();
            return text.trim();
        }
    } catch (error) {
        console.error(`Failed to load dev.txt for ${appName}:`, error);
    }

    return "Unknown Developer";
}

function renderApps(apps) {
    const container = document.getElementById("apps");
    container.innerHTML = "";

    if (apps.length === 0) {
        container.innerHTML =
            '<div class="loading">No apps found.</div>';
        return;
    }

    for (const app of apps) {
        const iconUrl =
            `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/${app.name}/assets/metro/tile.svg`;

        const appElement = document.createElement("div");
        appElement.className = "app";

        appElement.innerHTML = `
            <img src="${iconUrl}" alt="${app.name} icon">
            <div class="name">${app.name}</div>
            <div class="developer">${app.developer || "Unknown Developer"}</div>
        `;

        container.appendChild(appElement);
    }
}

// Search functionality
document.getElementById("search-input").addEventListener("input", (e) => {
    const searchTerm = e.target.value.toLowerCase();

    if (searchTerm === "") {
        renderApps(allApps);
        return;
    }

    const filtered = allApps.filter(app =>
        app.name.toLowerCase().includes(searchTerm)
    );

    renderApps(filtered);
});

loadApps();
</script>

</body>
</html>
