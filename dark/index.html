<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aysStore</title>
<link rel="icon" type="image/svg+xml" href="../store.svg">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #111;
    color: #fff;
    font-family: sans-serif;
}

#apps {
    padding: 12px;
}

.app {
    display: flex;
    align-items: center;
    gap: 12px;

    padding: 12px;
    margin-bottom: 8px;

    background: #1b1b1b;
    border: 1px solid #2a2a2a;
    border-radius: 8px;

    transition: background 0.15s ease;
}

.app:hover {
    background: #242424;
}

.app img {
    width: 120px;
    height: auto;
    flex-shrink: 0;
}

.name {
    font-size: 16px;
    font-weight: 500;
    word-break: break-word;
}

.loading,
.error {
    padding: 16px;
    color: #aaa;
}
</style>
</head>
<body>

<div id="apps">
    <div class="loading">Loading apps...</div>
</div>

<script>
const REPO_OWNER = "AYSemkiv";
const REPO_NAME = "aysOS-Apps";
const BRANCH = "main";

async function loadApps() {
    const container = document.getElementById("apps");

    try {
        const response = await fetch(
            `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents`
        );

        if (!response.ok) {
            throw new Error("Failed to fetch repository contents");
        }

        const items = await response.json();

        // Keep only folders (apps)
        const apps = items
            .filter(item =>
                item.type === "dir" &&
                item.name !== "dark" &&
                item.name !== "light"
            )
            .sort((a, b) => a.name.localeCompare(b.name));

        container.innerHTML = "";

        for (const app of apps) {
            const iconUrl =
                `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/${app.name}/assets/metro/tile.svg`;

            const appElement = document.createElement("div");
            appElement.className = "app";

            appElement.innerHTML = `
                <img src="${iconUrl}" alt="${app.name} icon">
                <div class="name">${app.name}</div>
            `;

            container.appendChild(appElement);
        }

        if (apps.length === 0) {
            container.innerHTML =
                '<div class="loading">No apps found.</div>';
        }

    } catch (error) {
        console.error(error);

        container.innerHTML =
            '<div class="error">Failed to load apps.</div>';
    }
}

loadApps();
</script>

</body>
</html>
