<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>aysOS Store</title>

<style>
body {
    margin: 0;
    background: #f5f5f5;
    color: #111;
    font-family: sans-serif;
}

#apps {
    padding: 12px;
}

.app {
    display: flex;
    align-items: center;
    gap: 12px;

    padding: 12px;
    margin-bottom: 8px;

    background: white;
    border: 1px solid #dcdcdc;
    border-radius: 8px;

    transition: background 0.15s ease;
}

.app:hover {
    background: #f0f0f0;
}

.app img {
    width: 120px;
    height: auto;
    flex-shrink: 0;
}

.name {
    font-size: 16px;
    font-weight: 500;
    word-break: break-word;
}

.loading,
.error {
    padding: 16px;
    color: #666;
}
</style>
</head>

<body>

<div id="apps"></div>

<script>
const REPO_OWNER = "AYSemkiv";
const REPO_NAME = "aysOS-Apps";

async function loadApps() {
    const response = await fetch(
        `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents`
    );

    const items = await response.json();

    const apps = items.filter(item => item.type === "dir");

    const container = document.getElementById("apps");

    for (const app of apps) {
        const icon =
            `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${app.name}/assets/metro/tile.svg`;

        const div = document.createElement("div");
        div.className = "app";

        div.innerHTML = `
            <img src="${icon}">
            <div class="name">${app.name}</div>
        `;

        container.appendChild(div);
    }
}

loadApps();
</script>

</body>
</html>
