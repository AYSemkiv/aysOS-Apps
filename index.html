<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aysStore</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    background: #111;
    color: white;
    font-family: sans-serif;
}

.container {
    width: min(500px, 90%);
    text-align: center;
}

h1 {
    margin-bottom: 8px;
}

p {
    color: #aaa;
    margin-bottom: 24px;
}

.buttons {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.button {
    display: block;

    padding: 16px;
    border-radius: 10px;

    background: #1b1b1b;
    border: 1px solid #2a2a2a;

    color: white;
    text-decoration: none;
    font-size: 18px;

    transition: background 0.15s ease;
}

.button:hover {
    background: #242424;
}
</style>
</head>
<body>

<div class="container">
    <h1>aysStore</h1>
    <p>Select a theme.</p>

    <div class="buttons">
        <a class="button" href="./dark/">
            🌙 Dark Mode
        </a>

        <a class="button" href="./light/">
            ☀️ Light Mode
        </a>
    </div>
</div>

</body>
</html>
